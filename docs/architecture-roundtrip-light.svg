<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="660" viewBox="0 0 1060 660" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Buildalyzer architecture: an out-of-process design-time build streamed back over a pipe and turned into a Roslyn workspace">
  <style>
    .bg{fill:#ffffff}
    .lane{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;stroke-dasharray:6 6}
    .title{font:700 22px sans-serif;fill:#0f172a}
    .sub{font:400 14px sans-serif;fill:#64748b}
    .lane-label{font:700 12px sans-serif;fill:#64748b;letter-spacing:.08em}
    .ct{font:700 15px sans-serif;fill:#0f172a}
    .cd{font:400 13px sans-serif;fill:#475569}
    .mono{font:500 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    .flab{font:600 12px sans-serif;fill:#64748b}
    .fsub{font:500 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#94a3b8}
    .flow{fill:none;stroke:#94a3b8;stroke-width:2}
    .flow-launch{fill:none;stroke:#10b981;stroke-width:2.5}
    .flow-pipe{fill:none;stroke:#f59e0b;stroke-width:3}
    .v-code{fill:#eff6ff;stroke:#3b82f6}
    .v-host{fill:#eef2ff;stroke:#6366f1}
    .v-pipe{fill:#fffbeb;stroke:#f59e0b}
    .v-proc{fill:#ecfdf5;stroke:#10b981}
    .v-result{fill:#f0fdfa;stroke:#14b8a6}
    .v-ws{fill:#f5f3ff;stroke:#8b5cf6}
    .card{stroke-width:1.5}
    .mk-n{fill:#94a3b8}.mk-l{fill:#10b981}.mk-p{fill:#f59e0b}
    .leg{font:500 12px sans-serif;fill:#64748b}
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" class="mk-n"/></marker>
    <marker id="al" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" class="mk-l"/></marker>
    <marker id="ap" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" class="mk-p"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1060" height="660" rx="16"/>
  <text class="title" x="32" y="42">Buildalyzer — how a project becomes a Roslyn Workspace</text>
  <text class="sub" x="32" y="64">An out-of-process, design-time build streamed back over an anonymous pipe.</text>

  <!-- lanes -->
  <rect class="lane" x="32" y="96" width="468" height="524" rx="14"/>
  <rect class="lane" x="676" y="170" width="352" height="316" rx="14"/>
  <text class="lane-label" x="48" y="122">① BUILDALYZER HOST PROCESS  (your app)</text>
  <text class="lane-label" x="692" y="196">② CHILD BUILD PROCESS</text>

  <!-- host cards -->
  <rect class="card v-code"   x="52" y="136" width="428" height="64" rx="10"/>
  <text class="ct"   x="68" y="162">Your code</text>
  <text class="mono" x="68" y="184">manager.GetProject(path)  ·  analyzer.GetWorkspace()</text>

  <rect class="card v-host"   x="52" y="230" width="428" height="64" rx="10"/>
  <text class="ct" x="68" y="256">ProjectAnalyzer  ·  ProcessRunner</text>
  <text class="cd" x="68" y="278">configures a design-time build (targets, global properties)</text>

  <rect class="card v-pipe"   x="52" y="324" width="428" height="76" rx="10"/>
  <text class="ct" x="68" y="350">AnonymousPipeLoggerServer</text>
  <text class="cd" x="68" y="369">XenoAtom.MsBuildPipeLogger — owns the pipe and</text>
  <text class="cd" x="68" y="386">hands the client handle to the child process</text>

  <rect class="card v-result" x="52" y="430" width="428" height="68" rx="10"/>
  <text class="ct" x="68" y="456">EventProcessor  →  AnalyzerResult</text>
  <text class="cd" x="68" y="475">one result per target framework</text>
  <text class="cd" x="68" y="491">properties · items · references · sources · Csc command line</text>

  <rect class="card v-ws"     x="52" y="528" width="428" height="68" rx="10"/>
  <text class="ct" x="68" y="554">Buildalyzer.Workspaces</text>
  <text class="cd" x="68" y="573">AdhocWorkspace — Roslyn ProjectInfo, documents,</text>
  <text class="cd" x="68" y="589">metadata references, wired project references</text>

  <!-- child cards -->
  <rect class="card v-proc"   x="696" y="210" width="312" height="92" rx="10"/>
  <text class="ct" x="712" y="238">dotnet msbuild</text>
  <text class="cd" x="712" y="259">design-time build, out-of-process</text>
  <text class="cd" x="712" y="277">no real compiler runs (SkipCompiler)</text>

  <rect class="card v-pipe"   x="696" y="330" width="312" height="112" rx="10"/>
  <text class="ct" x="712" y="358">BuildalyzerLogger : PipeLogger</text>
  <text class="cd" x="712" y="379">runs inside the build and subscribes</text>
  <text class="cd" x="712" y="396">to MSBuild events:</text>
  <text class="mono" x="712" y="416">ProjectStarted · TaskParameter</text>
  <text class="cd" x="712" y="434">and writes each one to the pipe</text>

  <!-- host vertical connectors -->
  <path class="flow" d="M266,200 L266,228" marker-end="url(#ah)"/>
  <path class="flow" d="M266,294 L266,322" marker-end="url(#ah)"/>
  <path class="flow" d="M266,400 L266,428" marker-end="url(#ah)"/>
  <path class="flow" d="M266,498 L266,526" marker-end="url(#ah)"/>
  <!-- child vertical connector -->
  <path class="flow" d="M852,302 L852,328" marker-end="url(#ah)"/>

  <!-- launch arrow (host -> child) -->
  <text class="flab" x="588" y="228" text-anchor="middle">spawn dotnet msbuild</text>
  <text class="fsub" x="588" y="243" text-anchor="middle">+ pipe client handle</text>
  <path class="flow-launch" d="M480,256 L692,256" marker-end="url(#al)"/>

  <!-- events pipe arrow (child -> host) -->
  <text class="flab" x="588" y="342" text-anchor="middle">build events</text>
  <text class="fsub" x="588" y="357" text-anchor="middle">over anonymous pipe</text>
  <path class="flow-pipe" d="M694,366 L482,366" marker-end="url(#ap)"/>

  <!-- legend -->
  <line x1="32" y1="638" x2="60" y2="638" class="flow-launch"/>
  <text class="leg" x="66" y="642">control · spawn</text>
  <line x1="190" y1="638" x2="218" y2="638" class="flow-pipe"/>
  <text class="leg" x="224" y="642">event data · pipe</text>
</svg>
